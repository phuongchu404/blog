<!doctype html>
<html lang="en">
  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <title>Blog Admin | Categories</title>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=yes"
    />
    <meta name="color-scheme" content="light dark" />
    <link
      rel="stylesheet"
      href="../assets/css/source-sans-3.css"
      crossorigin="anonymous"
      media="print"
      onload="this.media = 'all'"
    />
    <link
      rel="stylesheet"
      href="../assets/css/overlayscrollbars.min.css"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="../assets/css/bootstrap-icons.min.css"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="../assets/css/adminlte.min.css"
    />
    <link rel="stylesheet" href="../css/custom.css" />
  </head>

  <body class="layout-fixed sidebar-expand-lg bg-body-tertiary">
    <div class="app-wrapper">
      <div data-admin-header></div>

      <div data-admin-sidebar></div>

      <!-- ======= Main Content ======= -->
      <main class="app-main">
        <div class="app-content-header">
          <div class="container-fluid">
            <div class="row">
              <div class="col-sm-6">
                <h3 class="mb-0" data-i18n="categories.title">Categories</h3>
              </div>
              <div class="col-sm-6">
                <ol class="breadcrumb float-sm-end">
                  <li class="breadcrumb-item">
                    <a href="../index.html" data-i18n="common.home">Home</a>
                  </li>
                  <li class="breadcrumb-item active" data-i18n="categories.title">Categories</li>
                </ol>
              </div>
            </div>
          </div>
        </div>

        <div class="app-content">
          <div class="container-fluid">
            <div class="row">
              <!-- Add Category Form -->
              <div class="col-md-4">
                <div class="card">
                  <div class="card-header">
                    <h3 class="card-title" data-i18n="categories.card_add"><i class="bi bi-plus-circle me-2"></i>Add New Category</h3>
                  </div>
                  <div class="card-body">
                    <form action="#" method="post">
                      <div class="mb-3">
                        <label for="catTitle" class="form-label" data-i18n="categories.label_title">Title <span class="text-danger">*</span></label>
                        <input
                          type="text"
                          class="form-control"
                          id="catTitle"
                          data-i18n-placeholder="categories.placeholder_title"
                          placeholder="Category title"
                          required
                        />
                      </div>
                      <div class="mb-3">
                        <label for="catSlug" class="form-label" data-i18n="categories.label_slug">Slug</label>
                        <input
                          type="text"
                          class="form-control"
                          id="catSlug"
                          data-i18n-placeholder="categories.placeholder_slug"
                          placeholder="category-slug"
                        />
                        <small class="text-muted" data-i18n="categories.hint_slug">Auto-generated if blank.</small>
                      </div>
                      <div class="mb-3">
                        <label for="catParent" class="form-label" data-i18n="categories.label_parent">Parent Category</label>
                        <select class="form-select" id="catParent">
                          <option value="" data-i18n="categories.option_none">None (Top Level)</option>
                        </select>
                      </div>
                      <div class="mb-4">
                        <label for="catDescription" class="form-label" data-i18n="categories.label_content">Content</label>
                        <textarea
                          class="form-control"
                          id="catDescription"
                          rows="3"
                          data-i18n-placeholder="categories.placeholder_content"
                          placeholder="Optional description..."
                        ></textarea>
                      </div>
                      <div class="mb-3">
                        <label class="form-label" data-i18n="categories.label_image">Image</label>
                        <div
                          id="catImgDropZone"
                          class="border rounded p-3 text-center bg-body-secondary"
                          style="min-height: 100px; cursor: pointer"
                          onclick="document.getElementById('catImageFile').click()"
                        >
                          <i class="bi bi-cloud-upload fs-2 text-muted d-block mb-1"></i>
                          <span class="text-muted small" data-i18n="categories.upload_zone">Click to upload</span>
                        </div>
                        <img id="catImgPreview" class="img-fluid w-100 mt-2 rounded d-none" alt="Preview" />
                        <input type="file" id="catImageFile" class="form-control mt-2" accept="image/*" />
                        <input type="hidden" id="catImageUrl" />
                      </div>
                      <div class="mb-4">
                        <button
                          type="submit"
                          id="submitBtn"
                          class="btn btn-primary"
                        >
                          <i class="bi bi-plus-circle me-1"></i> <span data-i18n="categories.btn_add">Add Category</span>
                        </button>
                        <button
                          type="button"
                          id="cancelEditBtn"
                          class="btn btn-secondary d-none"
                        >
                          <i class="bi bi-x-circle me-1"></i><span data-i18n="categories.btn_cancel">Cancel</span>
                        </button>
                      </div>
                    </form>
                  </div>
                </div>
              </div>

              <!-- Categories Table -->
              <div class="col-md-8">
                <!-- Search -->
                <div class="mb-3">
                  <div class="input-group">
                    <input
                      type="text"
                      id="cat-search"
                      class="form-control"
                      placeholder="Search categories by name or slug..." data-i18n-placeholder="categories.search"
                      autocomplete="off"
                    />
                    <button
                      id="cat-refresh-btn"
                      class="btn btn-outline-secondary"
                      type="button"
                      title="Refresh"
                    >
                      <i class="bi bi-arrow-clockwise"></i>
                    </button>
                  </div>
                </div>

                <div class="card">
                  <div class="card-header">
                    <h3 class="card-title" data-i18n="categories.card_list"><i class="bi bi-tags me-2"></i>All Categories</h3>
                    <div class="card-tools ms-auto">
                      <span class="badge text-bg-primary">0 total</span>
                    </div>
                  </div>
                  <div class="card-body p-0">
                    <div style="overflow-x: auto">
                      <table
                        class="table table-striped table-hover align-middle mb-0"
                      >
                        <thead>
                          <tr>
                            <th>
                              <input
                                type="checkbox"
                                class="form-check-input"
                                id="selectAll"
                              />
                            </th>
                            <th data-i18n="categories.col_title">Title</th>
                            <th data-i18n="categories.col_slug">Slug</th>
                            <th data-i18n="categories.col_content">Content</th>
                            <th data-i18n="categories.col_posts">Posts</th>
                            <th data-i18n="categories.col_actions">Actions</th>
                          </tr>
                        </thead>
                        <tbody id="cat-tbody"></tbody>
                      </table>
                    </div>
                  </div>
                  <div class="card-footer clearfix">
                    <div id="cat-pagination"></div>
                    <button
                      class="btn btn-sm btn-danger float-start"
                      id="deleteSelectedBtn"
                    >
                      <i class="bi bi-trash me-1"></i> <span data-i18n="categories.btn_delete_selected">Delete Selected</span>
                    </button>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </main>

      <div data-admin-footer></div>
    </div>

    <script
      src="../js/template/overlayscrollbars.browser.es6.min.js"
      crossorigin="anonymous"
    ></script>
    <script
      src="../js/template/popper.min.js"
      crossorigin="anonymous"
    ></script>
    <script
      src="../js/template/bootstrap.min.js"
      crossorigin="anonymous"
    ></script>
    <script src="../js/template/adminlte.min.js"></script>
    <script src="../js/locales/vi.js"></script>
  <script src="../js/locales/en.js"></script>
  <script src="../js/i18n.js"></script>
  <script src="../js/http.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/ui.js"></script>
    <script src="../js/services/category.service.js"></script>
    <script src="../js/services/notification.service.js"></script>
    <script>
      Auth.guard();
      AdminNotif.init();
    </script>
    <script src="../js/pages/categories.js"></script>
  </body>
</html>
