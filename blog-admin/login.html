<!doctype html>
<html lang="en">
  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <title>Blog Admin | Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
    <meta name="color-scheme" content="light dark" />
    <link rel="stylesheet" href="assets/css/source-sans-3.css" crossorigin="anonymous" media="print" onload="this.media='all'" />
    <link rel="stylesheet" href="assets/css/overlayscrollbars.min.css" crossorigin="anonymous" />
    <link rel="stylesheet" href="assets/css/bootstrap-icons.min.css" crossorigin="anonymous" />
    <link rel="stylesheet" href="assets/css/adminlte.min.css" />
    <link rel="stylesheet" href="css/custom.css" />
  </head>
  <body class="login-page bg-body-secondary">
    <div class="login-box">
      <div class="login-logo">
        <a href="index.html"><b>Blog</b> Admin</a>
      </div>
      <div class="card">
        <div class="card-body login-card-body">
          <p class="login-box-msg">Sign in to manage your blog</p>
          <div id="loginAlert" class="alert alert-danger d-none" role="alert"></div>
          <form id="loginForm">
            <div class="input-group mb-3">
              <input type="text" class="form-control" id="loginUsername" placeholder="Username" required />
              <div class="input-group-text"><span class="bi bi-person"></span></div>
            </div>
            <div class="input-group mb-3">
              <input type="password" class="form-control" id="loginPassword" placeholder="Password" required />
              <div class="input-group-text"><span class="bi bi-lock-fill"></span></div>
            </div>
            <div class="row">
              <div class="col-8">
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" id="rememberMe" />
                  <label class="form-check-label" for="rememberMe">Remember Me</label>
                </div>
              </div>
              <div class="col-4">
                <div class="d-grid">
                  <button type="submit" class="btn btn-primary" id="loginBtn">Sign In</button>
                </div>
              </div>
            </div>
          </form>
          <p class="mb-1 mt-3">
            <a href="#">I forgot my password</a>
          </p>
        </div>
      </div>
    </div>

    <script src="js/template/overlayscrollbars.browser.es6.min.js" crossorigin="anonymous"></script>
    <script src="js/template/popper.min.js" crossorigin="anonymous"></script>
    <script src="js/template/bootstrap.min.js" crossorigin="anonymous"></script>
    <script src="js/template/adminlte.min.js"></script>
    <script src="js/http.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/pages/login.js"></script>
  </body>
</html>
