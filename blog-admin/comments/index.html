<!doctype html>
<html lang="en">

<head>
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
  <title>Blog Admin | Comments</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
  <meta name="color-scheme" content="light dark" />
  <link rel="stylesheet" href="../assets/css/source-sans-3.css" crossorigin="anonymous" media="print"
    onload="this.media = 'all'" />
  <link rel="stylesheet" href="../assets/css/overlayscrollbars.min.css" crossorigin="anonymous" />
  <link rel="stylesheet" href="../assets/css/bootstrap-icons.min.css" crossorigin="anonymous" />
  <link rel="stylesheet" href="../assets/css/adminlte.min.css" />
  <link rel="stylesheet" href="../css/custom.css" />
</head>

<body class="layout-fixed sidebar-expand-lg bg-body-tertiary">
  <div class="app-wrapper">
    <div data-admin-header></div>

    <div data-admin-sidebar></div>

    <!-- ======= Main Content ======= -->
    <main class="app-main">
      <div class="app-content-header">
        <div class="container-fluid">
          <div class="row">
            <div class="col-sm-6">
              <h3 class="mb-0" data-i18n="comments.title">Comments</h3>
            </div>
            <div class="col-sm-6">
              <ol class="breadcrumb float-sm-end">
                <li class="breadcrumb-item">
                  <a href="../index.html" data-i18n="common.home">Home</a>
                </li>
                <li class="breadcrumb-item active" data-i18n="comments.title">Comments</li>
              </ol>
            </div>
          </div>
        </div>
      </div>

      <div class="app-content">
        <div class="container-fluid">
          <!-- Stats -->
          <div class="row mb-3">
            <div class="col-md-3 col-6">
              <div class="info-box">
                <span class="info-box-icon text-bg-primary"><i class="bi bi-chat-dots"></i></span>
                <div class="info-box-content">
                  <span class="info-box-text" data-i18n="comments.lbl_total">Total</span>
                  <span class="info-box-number">128</span>
                </div>
              </div>
            </div>
            <div class="col-md-3 col-6">
              <div class="info-box">
                <span class="info-box-icon text-bg-warning"><i class="bi bi-hourglass-split"></i></span>
                <div class="info-box-content">
                  <span class="info-box-text" data-i18n="comments.lbl_pending">Pending</span>
                  <span class="info-box-number">14</span>
                </div>
              </div>
            </div>
            <div class="col-md-3 col-6">
              <div class="info-box">
                <span class="info-box-icon text-bg-success"><i class="bi bi-check-circle"></i></span>
                <div class="info-box-content">
                  <span class="info-box-text" data-i18n="comments.lbl_approved">Approved</span>
                  <span class="info-box-number">108</span>
                </div>
              </div>
            </div>
            <div class="col-md-3 col-6">
              <div class="info-box">
                <span class="info-box-icon text-bg-danger"><i class="bi bi-slash-circle"></i></span>
                <div class="info-box-content">
                  <span class="info-box-text" data-i18n="comments.lbl_spam">Spam</span>
                  <span class="info-box-number">6</span>
                </div>
              </div>
            </div>
          </div>

          <!-- Filter Row -->
          <div class="row mb-3">
            <div class="col-md-5">
              <div class="input-group">
                <input type="text" id="comments-search" class="form-control" placeholder="Search comments..." data-i18n-placeholder="comments.search"
                  autocomplete="off" />
                <button id="comments-refresh-btn" class="btn btn-outline-secondary" type="button" title="Refresh">
                  <i class="bi bi-arrow-clockwise"></i>
                </button>
              </div>
            </div>
            <div class="col-md-3">
              <select class="form-select">
                <option value="" data-i18n="comments.filter_all">All Status</option>
                <option value="pending" data-i18n="common.pending">Pending</option>
                <option value="approved" data-i18n="common.approved">Approved</option>
                <option value="spam" data-i18n="common.spam">Spam</option>
              </select>
            </div>
            <div class="col-md-4 text-end">
              <button id="btn-approve-all" class="btn btn-success me-1">
                <i class="bi bi-check-all me-1"></i><span data-i18n="comments.btn_approve_all">Approve All Pending</span>
              </button>
              <button class="btn btn-danger">
                <i class="bi bi-trash me-1"></i><span data-i18n="comments.btn_delete_spam">Delete Spam</span>
              </button>
            </div>
          </div>

          <!-- Comments Table -->
          <div class="card">
            <div class="card-header">
              <h3 class="card-title" data-i18n="comments.card_list"><i class="bi bi-chat-dots me-2"></i>All Comments</h3>
              <div class="card-tools ms-auto">
                <span class="badge text-bg-primary" id="comments-total-badge">0 total</span>
              </div>
            </div>
            <div class="card-body p-0">
              <table class="table table-striped table-hover align-middle mb-0">
                <thead>
                  <tr>
                    <th>
                      <input type="checkbox" class="form-check-input" />
                    </th>
                    <th data-i18n="comments.col_author">Author</th>
                    <th data-i18n="comments.col_comment">Comment</th>
                    <th data-i18n="comments.col_post">Post</th>
                    <th data-i18n="comments.col_status">Status</th>
                    <th data-i18n="comments.col_date">Date</th>
                    <th data-i18n="comments.col_actions">Actions</th>
                  </tr>
                </thead>
                <tbody id="comments-tbody">
                </tbody>
              </table>
            </div>
            <div class="card-footer clearfix">
              <div id="comments-pagination" class="float-end"></div>
              <div class="float-start">
                <button class="btn btn-sm btn-danger me-1">
                  <i class="bi bi-trash me-1"></i><span data-i18n="comments.btn_delete_selected">Delete Selected</span>
                </button>
                <button class="btn btn-sm btn-success">
                  <i class="bi bi-check-circle me-1"></i><span data-i18n="comments.btn_approve_selected">Approve Selected</span>
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <div data-admin-footer></div>
  </div>

  <script src="../js/template/overlayscrollbars.browser.es6.min.js" crossorigin="anonymous"></script>
  <script src="../js/template/popper.min.js" crossorigin="anonymous"></script>
  <script src="../js/template/bootstrap.min.js" crossorigin="anonymous"></script>
  <script src="../js/template/adminlte.min.js"></script>
  <script src="../js/locales/vi.js"></script>
  <script src="../js/locales/en.js"></script>
  <script src="../js/i18n.js"></script>
  <script src="../js/http.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/ui.js"></script>
  <script src="../js/services/post.service.js"></script>
  <script src="../js/services/comment.service.js"></script>
  <script src="../js/services/notification.service.js"></script>
  <script>
    Auth.guard();
    AdminNotif.init();
  </script>
  <script src="../js/pages/comments.js"></script>
</body>

</html>
