<!doctype html>
<html lang="en">

<head>
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
  <title>Blog Admin | Tags</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
  <meta name="color-scheme" content="light dark" />
  <link rel="stylesheet" href="../assets/css/source-sans-3.css" crossorigin="anonymous" media="print"
    onload="this.media = 'all'" />
  <link rel="stylesheet" href="../assets/css/overlayscrollbars.min.css" crossorigin="anonymous" />
  <link rel="stylesheet" href="../assets/css/bootstrap-icons.min.css" crossorigin="anonymous" />
  <link rel="stylesheet" href="../assets/css/adminlte.min.css" />
  <link rel="stylesheet" href="../css/custom.css" />
</head>

<body class="layout-fixed sidebar-expand-lg bg-body-tertiary">
  <div class="app-wrapper">
    <div data-admin-header></div>

    <div data-admin-sidebar></div>

    <!-- ======= Main Content ======= -->
    <main class="app-main">
      <div class="app-content-header">
        <div class="container-fluid">
          <div class="row">
            <div class="col-sm-6">
              <h3 class="mb-0" data-i18n="tags.title">Tags</h3>
            </div>
            <div class="col-sm-6">
              <ol class="breadcrumb float-sm-end">
                <li class="breadcrumb-item">
                  <a href="../index.html" data-i18n="common.home">Home</a>
                </li>
                <li class="breadcrumb-item active" data-i18n="tags.title">Tags</li>
              </ol>
            </div>
          </div>
        </div>
      </div>

      <div class="app-content">
        <div class="container-fluid">
          <div class="row">
            <!-- Add Tag Form -->
            <div class="col-md-4">
              <div class="card">
                <div class="card-header">
                  <h3 class="card-title" id="formCardTitle">
                    <i class="bi bi-plus-circle me-2"></i>Add New Tag
                  </h3>
                </div>
                <div class="card-body">
                  <form action="#" method="post" id="addTagForm">
                    <div class="mb-3">
                      <label for="tagName" class="form-label" data-i18n="tags.label_title">Name <span class="text-danger">*</span></label>
                      <input type="text" class="form-control" id="tagName" data-i18n-placeholder="tags.placeholder_title" placeholder="Tag name" required />
                    </div>
                    <div class="mb-4">
                      <label for="tagSlug" class="form-label" data-i18n="tags.label_slug">Slug</label>
                      <input type="text" class="form-control" id="tagSlug" data-i18n-placeholder="tags.placeholder_slug" placeholder="tag-slug" />
                      <small class="text-muted" data-i18n="tags.hint_slug">Auto-generated if blank.</small>
                    </div>
                    <div class="mb-3">
                      <label for="tagContent" class="form-label" data-i18n="tags.label_content">Content</label>
                      <textarea class="form-control" id="tagContent" rows="3"
                        placeholder="Tag description or content..."></textarea>
                    </div>
                    <div class="mb-3">
                      <label class="form-label" data-i18n="tags.label_image">Image</label>
                      <div id="tagImgDropZone" class="border rounded p-3 text-center bg-body-secondary"
                        style="min-height: 100px; cursor: pointer"
                        onclick="document.getElementById('tagImageFile').click()">
                        <i class="bi bi-cloud-upload fs-2 text-muted d-block mb-1"></i>
                        <span class="text-muted small">Click to upload</span>
                      </div>
                      <img id="tagImgPreview" class="img-fluid w-100 mt-2 rounded d-none" alt="Preview" />
                      <input type="file" id="tagImageFile" class="form-control mt-2" accept="image/*" />
                      <input type="hidden" id="tagImageUrl" />
                    </div>
                    <div class="mb-4">
                      <button type="submit" id="submitBtn" class="btn btn-primary">
                        <i class="bi bi-plus-circle me-1"></i> <span data-i18n="tags.btn_add">Add Tag</span>
                      </button>
                      <button type="button" id="cancelEditBtn" class="btn btn-secondary d-none">
                        <i class="bi bi-x-circle me-1"></i> <span data-i18n="tags.btn_cancel">Cancel</span>
                      </button>
                    </div>
                  </form>
                </div>
              </div>
            </div>

            <!-- Tags Table -->
            <div class="col-md-8">
              <!-- Search -->
              <div class="mb-3">
                <div class="input-group">
                  <input type="text" id="tag-search" class="form-control" data-i18n-placeholder="tags.search" placeholder="Search tags by name or slug..."
                    autocomplete="off" />
                  <button id="tag-refresh-btn" class="btn btn-outline-secondary" type="button" title="Refresh">
                    <i class="bi bi-arrow-clockwise"></i>
                  </button>
                </div>
              </div>

              <div class="card">
                <div class="card-header">
                  <h3 class="card-title" data-i18n="tags.card_list"><i class="bi bi-hash me-2"></i>All Tags</h3>
                  <div class="card-tools ms-auto">
                    <span class="badge text-bg-primary"><span id="tag-count">0</span> total</span>
                  </div>
                </div>
                <div class="card-body p-0">
                  <table class="table table-striped table-hover align-middle mb-0">
                    <thead>
                      <tr>
                        <th>
                          <input type="checkbox" class="form-check-input" id="selectAll" />
                        </th>
                        <th>STT</th>
                        <th data-i18n="tags.col_title">Name</th>
                        <th data-i18n="tags.col_slug">Slug</th>
                        <th data-i18n="tags.col_posts">Posts</th>
                        <th data-i18n="tags.col_actions">Actions</th>
                      </tr>
                    </thead>
                    <tbody id="tags-tbody">
                      <tr>
                        <td colspan="5" class="text-center py-4 text-muted">
                          <div class="spinner-border spinner-border-sm me-2" role="status"></div>
                          Loading tags...
                        </td>
                      </tr>
                    </tbody>
                  </table>
                </div>
                <div class="card-footer clearfix">
                  <div id="tags-pagination"></div>
                  <button class="btn btn-sm btn-danger float-start" id="deleteSelectedBtn">
                    <i class="bi bi-trash me-1"></i> <span data-i18n="tags.btn_delete_selected">Delete Selected</span>
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <div data-admin-footer></div>
  </div>

  <!-- Edit Tag Modal -->
  <div class="modal fade" id="editTagModal" tabindex="-1" aria-labelledby="editTagModalLabel" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="editTagModalLabel">
            <i class="bi bi-pencil me-2"></i>Edit Tag
          </h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <form id="editTagForm">
            <div class="mb-3">
              <label for="editTagName" class="form-label" data-i18n="tags.label_title">Name <span class="text-danger">*</span></label>
              <input type="text" class="form-control" id="editTagName" required />
            </div>
            <div class="mb-3">
              <label for="editTagSlug" class="form-label" data-i18n="tags.label_slug">Slug</label>
              <input type="text" class="form-control" id="editTagSlug" />
            </div>
            <div class="mb-3">
              <label for="editTagContent" class="form-label" data-i18n="tags.label_content">Content</label>
              <textarea class="form-control" id="editTagContent" rows="3"
                placeholder="Tag description or content..."></textarea>
            </div>
            <div class="mb-3">
              <label class="form-label">Image</label>
              <div id="editTagImgDropZone" class="border rounded p-3 text-center bg-body-secondary"
                style="min-height: 100px; cursor: pointer"
                onclick="document.getElementById('editTagImageFile').click()">
                <i class="bi bi-cloud-upload fs-2 text-muted d-block mb-1"></i>
                <span class="text-muted small">Click to upload</span>
              </div>
              <img id="editTagImgPreview" class="img-fluid w-100 mt-2 rounded d-none" alt="Preview" />
              <input type="file" id="editTagImageFile" class="form-control mt-2" accept="image/*" />
              <input type="hidden" id="editTagImageUrl" />
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal" data-i18n="tags.btn_cancel">Cancel</button>
          <button type="submit" form="editTagForm" class="btn btn-primary">
            <i class="bi bi-check-circle me-1"></i> <span data-i18n="common.save">Save Changes</span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="../js/template/overlayscrollbars.browser.es6.min.js" crossorigin="anonymous"></script>
  <script src="../js/template/popper.min.js" crossorigin="anonymous"></script>
  <script src="../js/template/bootstrap.min.js" crossorigin="anonymous"></script>
  <script src="../js/template/adminlte.min.js"></script>
  <script src="../js/locales/vi.js"></script>
  <script src="../js/locales/en.js"></script>
  <script src="../js/i18n.js"></script>
  <script src="../js/http.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/ui.js"></script>
  <script src="../js/services/tag.service.js"></script>
  <script src="../js/services/notification.service.js"></script>
  <script>
    Auth.guard();
    AdminNotif.init();
  </script>
  <script src="../js/pages/tags.js"></script>
</body>

</html>
