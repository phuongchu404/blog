<!doctype html>
<html lang="en">

<head>
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
  <title>Blog Admin | Posts</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
  <meta name="color-scheme" content="light dark" />
  <link rel="stylesheet" href="../assets/css/source-sans-3.css" crossorigin="anonymous" media="print"
    onload="this.media = 'all'" />
  <link rel="stylesheet" href="../assets/css/overlayscrollbars.min.css" crossorigin="anonymous" />
  <link rel="stylesheet" href="../assets/css/bootstrap-icons.min.css" crossorigin="anonymous" />
  <link rel="stylesheet" href="../assets/css/adminlte.min.css" />
  <link rel="stylesheet" href="../css/custom.css" />
</head>

<body class="layout-fixed sidebar-expand-lg bg-body-tertiary">
  <div class="app-wrapper">
    <div data-admin-header></div>

    <div data-admin-sidebar></div>

    <!-- ======= Main Content ======= -->
    <main class="app-main">
      <div class="app-content-header">
        <div class="container-fluid">
          <div class="row">
            <div class="col-sm-6">
              <h3 class="mb-0" data-i18n="posts.title">All Posts</h3>
            </div>
            <div class="col-sm-6">
              <ol class="breadcrumb float-sm-end">
                <li class="breadcrumb-item">
                  <a href="../index.html" data-i18n="common.home">Home</a>
                </li>
                <li class="breadcrumb-item active" data-i18n="posts.breadcrumb">Posts</li>
              </ol>
            </div>
          </div>
        </div>
      </div>

      <div class="app-content">
        <div class="container-fluid">
          <!-- Filter & Actions -->
          <div class="row mb-3">
            <div class="col-md-6">
              <div class="input-group">
                <input type="text" id="posts-search" class="form-control" placeholder="Search posts..." data-i18n-placeholder="posts.search" />
                <button id="posts-refresh-btn" class="btn btn-outline-secondary" type="button" title="Refresh">
                  <i class="bi bi-arrow-clockwise"></i>
                </button>
              </div>
            </div>
            <div class="col-md-3">
              <select class="form-select" id="posts-status-filter">
                <option value="" data-i18n="posts.filter_all_status">All Status</option>
                <option value="PUBLISHED" data-i18n="common.published">Published</option>
                <option value="DRAFT" data-i18n="common.draft">Draft</option>
                <option value="ARCHIVED" data-i18n="common.archived">Archived</option>
              </select>
            </div>
            <div class="col-md-3 text-end">
              <a href="create.html" class="btn btn-primary">
                <i class="bi bi-plus-circle me-1"></i> <span data-i18n="posts.btn_new">New Post</span>
              </a>
            </div>
          </div>

          <!-- Posts Table -->
          <div class="card">
            <div class="card-header">
              <h3 class="card-title" data-i18n="posts.card_title">
                <i class="bi bi-file-earmark-text me-2"></i>Posts List
              </h3>
              <div class="card-tools ms-auto">
                <span class="badge text-bg-primary" id="posts-total">â€” total</span>
              </div>
            </div>
            <div class="card-body p-0">
              <table class="table table-striped table-hover align-middle mb-0">
                <thead>
                  <tr>
                    <th style="width: 40px">
                      <input type="checkbox" class="form-check-input" />
                    </th>
                    <th>#</th>
                    <th data-i18n="posts.col_title">Title</th>
                    <th data-i18n="posts.col_author">Author</th>
                    <th data-i18n="posts.col_category">Category</th>
                    <th data-i18n="posts.col_status">Status</th>
                    <th data-i18n="posts.col_views">Views</th>
                    <th data-i18n="posts.col_date">Date</th>
                    <th style="width: 100px" data-i18n="posts.col_actions">Actions</th>
                  </tr>
                </thead>
                <tbody id="posts-tbody">
                </tbody>
              </table>
            </div>
            <div class="card-footer clearfix">
              <ul class="pagination pagination-sm m-0 float-end">
                <li class="page-item disabled">
                  <a class="page-link" href="#">Â«</a>
                </li>
                <li class="page-item active">
                  <a class="page-link" href="#">1</a>
                </li>
                <li class="page-item"><a class="page-link" href="#">2</a></li>
                <li class="page-item"><a class="page-link" href="#">3</a></li>
                <li class="page-item"><a class="page-link" href="#">Â»</a></li>
              </ul>
              <div class="float-start">
                <select class="form-select form-select-sm">
                  <option data-i18n="posts.per_page_10">10 per page</option>
                  <option data-i18n="posts.per_page_25">25 per page</option>
                  <option data-i18n="posts.per_page_50">50 per page</option>
                </select>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <div data-admin-footer></div>
  </div>

  <script src="../js/template/overlayscrollbars.browser.es6.min.js" crossorigin="anonymous"></script>
  <script src="../js/template/popper.min.js" crossorigin="anonymous"></script>
  <script src="../js/template/bootstrap.min.js" crossorigin="anonymous"></script>
  <script src="../js/template/adminlte.min.js"></script>
  <script src="../js/locales/vi.js"></script>
  <script src="../js/locales/en.js"></script>
  <script src="../js/i18n.js"></script>
  <script src="../js/http.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/ui.js"></script>
  <script src="../js/services/post.service.js"></script>
  <script src="../js/services/setting.service.js"></script>
  <script src="../js/services/notification.service.js"></script>
  <script>
    Auth.guard();
    AdminNotif.init();
  </script>
  <script src="../js/pages/posts-index.js"></script>
</body>

</html>
