<!doctype html>
<html lang="en">
  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <title>Blog Admin | Audit Logs</title>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=yes"
    />
    <meta name="color-scheme" content="light dark" />
    <link
      rel="stylesheet"
      href="../assets/css/source-sans-3.css"
      crossorigin="anonymous"
      media="print"
      onload="this.media = 'all'"
    />
    <link
      rel="stylesheet"
      href="../assets/css/overlayscrollbars.min.css"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="../assets/css/bootstrap-icons.min.css"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="../assets/css/adminlte.min.css" />
    <link rel="stylesheet" href="../css/custom.css" />
    <!-- BS5 DateTime Picker -->
    <link rel="stylesheet" href="../css/bs5-datetime.min.css" />
  </head>

  <body class="layout-fixed sidebar-expand-lg bg-body-tertiary">
    <div class="app-wrapper">
      <div data-admin-header></div>

      <div data-admin-sidebar></div>

      <!-- ======= Main Content ======= -->
      <main class="app-main">
        <div class="app-content-header">
          <div class="container-fluid">
            <div class="row">
              <div class="col-sm-6">
                <h3 class="mb-0" data-i18n="audit_logs.title">Audit Logs</h3>
              </div>
              <div class="col-sm-6">
                <ol class="breadcrumb float-sm-end">
                  <li class="breadcrumb-item">
                    <a href="../index.html" data-i18n="common.home">Home</a>
                  </li>
                  <li class="breadcrumb-item active" data-i18n="audit_logs.title">Audit Logs</li>
                </ol>
              </div>
            </div>
          </div>
        </div>

        <div class="app-content">
          <div class="container-fluid">
            <!-- Filter Row -->
            <div class="card mb-3">
              <div class="card-body">
                <!-- Row 1: Text & Select Filters -->
                <div class="row g-2 mb-2">
                  <div class="col-md-3 col-sm-6">
                    <input
                      type="text"
                      id="filter-username"
                      class="form-control form-control-sm"
                      placeholder="Username..."
                    />
                  </div>
                  <div class="col-md-3 col-sm-6">
                    <select
                      class="form-select form-select-sm"
                      id="filter-action"
                    >
                      <option value="">All Actions</option>
                      <option>LOGIN</option>
                      <option>LOGOUT</option>
                      <option>REGISTER</option>
                      <option>CHANGE_PASSWORD</option>
                      <option>CREATE</option>
                      <option>UPDATE</option>
                      <option>DELETE</option>
                      <option>PUBLISH</option>
                      <option>UNPUBLISH</option>
                      <option>APPROVE</option>
                      <option>REJECT</option>
                      <option>UPLOAD</option>
                    </select>
                  </div>
                  <div class="col-md-3 col-sm-6">
                    <select
                      class="form-select form-select-sm"
                      id="filter-resource"
                    >
                      <option value="">All Resources</option>
                      <option>AUTH</option>
                      <option>POST</option>
                      <option>COMMENT</option>
                      <option>CATEGORY</option>
                      <option>TAG</option>
                      <option>USER</option>
                      <option>ROLE</option>
                      <option>PERMISSION</option>
                      <option>FILE</option>
                    </select>
                  </div>
                  <div class="col-md-3 col-sm-6">
                    <select
                      class="form-select form-select-sm"
                      id="filter-status"
                    >
                      <option value="">All Status</option>
                      <option>SUCCESS</option>
                      <option>FAIL</option>
                    </select>
                  </div>
                </div>
                <!-- Row 2: Date Filters + Actions -->
                <div class="row g-2 align-items-center">
                  <div class="col-md-4 col-sm-6">
                    <div class="input-group input-group-sm">
                      <span class="input-group-text text-muted"
                        ><i class="bi bi-calendar3"></i
                      ></span>
                      <input
                        id="filter-date-from"
                        class="form-control form-control-sm"
                        autocomplete="off"
                        placeholder="From date..."
                      />
                      <button
                        class="btn btn-outline-secondary d-none"
                        id="filter-date-from-toggle"
                        type="button"
                        aria-label="Pick from date"
                        aria-hidden="true"
                        hidden
                        style="display: none !important"
                        tabindex="-1"
                      >
                        <i class="bi bi-chevron-down"></i>
                      </button>
                    </div>
                  </div>
                  <div class="col-md-4 col-sm-6">
                    <div class="input-group input-group-sm">
                      <span class="input-group-text text-muted"
                        ><i class="bi bi-calendar3"></i
                      ></span>
                      <input
                        id="filter-date-to"
                        class="form-control form-control-sm"
                        autocomplete="off"
                        placeholder="To date..."
                      />
                      <button
                        class="btn btn-outline-secondary d-none"
                        id="filter-date-to-toggle"
                        type="button"
                        aria-label="Pick to date"
                        aria-hidden="true"
                        hidden
                        style="display: none !important"
                        tabindex="-1"
                      >
                        <i class="bi bi-chevron-down"></i>
                      </button>
                    </div>
                  </div>
                  <div class="col-md-4 col-sm-12 d-flex gap-2">
                    <button
                      id="btn-search"
                      class="btn btn-primary btn-sm px-3"
                      title="Search"
                    >
                      <i class="bi bi-search me-1"></i>Search
                    </button>
                    <button
                      id="btn-reset"
                      class="btn btn-outline-secondary btn-sm px-3"
                      title="Reset"
                    >
                      <i class="bi bi-x-lg"></i>
                    </button>
                  </div>
                </div>
              </div>
            </div>

            <!-- Table Card -->
            <div class="card">
              <div class="card-header">
                <h3 class="card-title">
                  <i class="bi bi-journal-text me-2"></i>Activity History
                </h3>
                <div class="card-tools ms-auto d-flex align-items-center gap-2">
                  <span class="badge text-bg-primary" id="audit-count-badge"
                    >0 total</span
                  >
                  <button id="btn-export" class="btn btn-sm btn-success">
                    <i class="bi bi-file-earmark-spreadsheet me-1"></i>Export
                    CSV
                  </button>
                </div>
              </div>
              <div class="card-body p-0">
                <div class="table-responsive">
                  <table
                    class="table table-striped table-hover align-middle mb-0 small"
                  >
                    <thead>
                      <tr>
                        <th>Time</th>
                        <th>User</th>
                        <th>Action</th>
                        <th>Resource</th>
                        <th>Detail</th>
                        <th>IP</th>
                        <th>Status</th>
                        <th>Duration</th>
                      </tr>
                    </thead>
                    <tbody id="audit-tbody">
                      <tr>
                        <td colspan="8" class="text-center text-muted py-4">
                          <i class="bi bi-hourglass-split me-2"></i>Loading...
                        </td>
                      </tr>
                    </tbody>
                  </table>
                </div>
              </div>
              <div class="card-footer clearfix">
                <ul
                  class="pagination pagination-sm m-0 float-end"
                  id="audit-pagination"
                ></ul>
                <small class="text-muted" id="audit-page-info"></small>
              </div>
            </div>
          </div>
        </div>
      </main>

      <div data-admin-footer></div>
    </div>

    <script
      src="../js/template/overlayscrollbars.browser.es6.min.js"
      crossorigin="anonymous"
    ></script>
    <script src="../js/template/popper.min.js" crossorigin="anonymous"></script>
    <script
      src="../js/template/bootstrap.min.js"
      crossorigin="anonymous"
    ></script>
    <script src="../js/template/adminlte.min.js"></script>
    <!-- BS5 DateTime Picker -->
    <script src="../js/template/bs5-datetime.min.js"></script>
    <script src="../js/locales/vi.js"></script>
  <script src="../js/locales/en.js"></script>
  <script src="../js/i18n.js"></script>
  <script src="../js/http.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/ui.js"></script>
    <script src="../js/services/notification.service.js"></script>
    <script>
      Auth.guard();
      AdminNotif.init();
    </script>
    <script src="../js/pages/audit-logs.js"></script>
  </body>
</html>
