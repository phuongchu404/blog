<!doctype html>
<html lang="en">
  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <title>Blog Admin | Profile</title>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=yes"
    />
    <meta name="color-scheme" content="light dark" />
    <link
      rel="stylesheet"
      href="assets/css/source-sans-3.css"
      crossorigin="anonymous"
      media="print"
      onload="this.media = 'all'"
    />
    <link
      rel="stylesheet"
      href="assets/css/overlayscrollbars.min.css"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="assets/css/bootstrap-icons.min.css"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="assets/css/adminlte.min.css" />
    <link rel="stylesheet" href="css/custom.css" />
  </head>
  <body class="layout-fixed sidebar-expand-lg bg-body-tertiary">
    <div class="app-wrapper">
      <div data-admin-header></div>

      <div data-admin-sidebar></div>

      <!-- ======= Main Content ======= -->
      <main class="app-main">
        <div class="app-content-header">
          <div class="container-fluid">
            <div class="row">
              <div class="col-sm-6"><h3 class="mb-0">My Profile</h3></div>
              <div class="col-sm-6">
                <ol class="breadcrumb float-sm-end">
                  <li class="breadcrumb-item"><a href="index.html">Home</a></li>
                  <li class="breadcrumb-item active">Profile</li>
                </ol>
              </div>
            </div>
          </div>
        </div>

        <div class="app-content">
          <div class="container-fluid">
            <div class="row">
              <!-- Profile Card -->
              <div class="col-md-4">
                <div class="card card-primary card-outline">
                  <div class="card-body text-center pt-4">
                    <div class="position-relative d-inline-block mb-3">
                      <img
                        src="assets/images/user2-160x160.jpg"
                        class="rounded-circle shadow"
                        width="120"
                        height="120"
                        alt="Profile Photo"
                        id="profilePhotoPreview"
                      />
                      <label
                        for="photoUpload"
                        class="position-absolute bottom-0 end-0 btn btn-sm btn-primary rounded-circle p-1"
                        style="cursor: pointer"
                        title="Change photo"
                      >
                        <i class="bi bi-camera"></i>
                      </label>
                      <input
                        type="file"
                        id="photoUpload"
                        accept="image/*"
                        class="d-none"
                      />
                    </div>
                    <h4 class="mb-0">Admin</h4>
                    <p class="text-muted mb-1">admin@blog.com</p>
                    <span class="badge text-bg-danger mb-3">ADMIN</span>
                    <div class="row text-center border-top pt-3">
                      <div class="col-4">
                        <strong>48</strong>
                        <p class="text-muted small mb-0">Posts</p>
                      </div>
                      <div class="col-4">
                        <strong>35</strong>
                        <p class="text-muted small mb-0">Users</p>
                      </div>
                      <div class="col-4">
                        <strong>128</strong>
                        <p class="text-muted small mb-0">Comments</p>
                      </div>
                    </div>
                  </div>
                  <div class="card-footer text-center">
                    <small class="text-muted">Member since January 2024</small>
                  </div>
                </div>

                <!-- Roles & Permissions Summary -->
                <div class="card">
                  <div class="card-header">
                    <h3 class="card-title">
                      <i class="bi bi-shield-check me-2"></i>My Roles
                    </h3>
                  </div>
                  <div class="card-body">
                    <span class="badge text-bg-danger me-1 mb-1">ADMIN</span>
                    <p class="text-muted small mt-2 mb-0">
                      Full access to all system features.
                    </p>
                  </div>
                </div>
              </div>

              <!-- Edit Forms -->
              <div class="col-md-8">
                <!-- Nav Tabs -->
                <div class="card">
                  <div class="card-header p-0">
                    <ul class="nav nav-tabs" id="profileTabs" role="tablist">
                      <li class="nav-item" role="presentation">
                        <button
                          class="nav-link active"
                          id="info-tab"
                          data-bs-toggle="tab"
                          data-bs-target="#info"
                          type="button"
                          role="tab"
                        >
                          <i class="bi bi-person me-1"></i>Personal Info
                        </button>
                      </li>
                      <li class="nav-item" role="presentation">
                        <button
                          class="nav-link"
                          id="password-tab"
                          data-bs-toggle="tab"
                          data-bs-target="#password"
                          type="button"
                          role="tab"
                        >
                          <i class="bi bi-lock me-1"></i>Change Password
                        </button>
                      </li>
                    </ul>
                  </div>
                  <div class="card-body">
                    <div class="tab-content" id="profileTabContent">
                      <!-- Personal Info Tab -->
                      <div
                        class="tab-pane fade show active"
                        id="info"
                        role="tabpanel"
                      >
                        <form id="profileInfoForm">
                          <div class="row">
                            <div class="col-md-6 mb-3">
                              <label for="firstName" class="form-label"
                                >First Name</label
                              >
                              <input
                                type="text"
                                class="form-control"
                                id="firstName"
                                value="Admin"
                              />
                            </div>
                            <div class="col-md-6 mb-3">
                              <label for="lastName" class="form-label"
                                >Last Name</label
                              >
                              <input
                                type="text"
                                class="form-control"
                                id="lastName"
                                value=""
                                placeholder="Last name"
                              />
                            </div>
                          </div>
                          <div class="mb-3">
                            <label for="username" class="form-label"
                              >Username</label
                            >
                            <div class="input-group">
                              <span class="input-group-text"
                                ><i class="bi bi-at"></i
                              ></span>
                              <input
                                type="text"
                                class="form-control"
                                id="username"
                                value="admin"
                              />
                            </div>
                          </div>
                          <div class="mb-3">
                            <label for="email" class="form-label"
                              >Email Address</label
                            >
                            <div class="input-group">
                              <span class="input-group-text"
                                ><i class="bi bi-envelope"></i
                              ></span>
                              <input
                                type="email"
                                class="form-control"
                                id="email"
                                value="admin@blog.com"
                              />
                            </div>
                          </div>
                          <div class="mb-3">
                            <label for="bio" class="form-label">Bio</label>
                            <textarea
                              class="form-control"
                              id="bio"
                              rows="3"
                              placeholder="Tell something about yourself..."
                            ></textarea>
                          </div>
                          <div class="mb-4">
                            <label for="website" class="form-label"
                              >Website</label
                            >
                            <div class="input-group">
                              <span class="input-group-text"
                                ><i class="bi bi-globe"></i
                              ></span>
                              <input
                                type="url"
                                class="form-control"
                                id="website"
                                placeholder="https://your-website.com"
                              />
                            </div>
                          </div>
                          <button type="submit" class="btn btn-primary">
                            <i class="bi bi-check-circle me-1"></i> Save Changes
                          </button>
                        </form>
                      </div>

                      <!-- Change Password Tab -->
                      <div class="tab-pane fade" id="password" role="tabpanel">
                        <form id="changePasswordForm">
                          <div class="mb-3">
                            <label for="currentPassword" class="form-label"
                              >Current Password
                              <span class="text-danger">*</span></label
                            >
                            <div class="input-group">
                              <input
                                type="password"
                                class="form-control"
                                id="currentPassword"
                                placeholder="Current password"
                                required
                              />
                              <button
                                class="btn btn-outline-secondary toggle-pw"
                                type="button"
                                data-target="currentPassword"
                              >
                                <i class="bi bi-eye"></i>
                              </button>
                            </div>
                          </div>
                          <div class="mb-3">
                            <label for="newPassword" class="form-label"
                              >New Password
                              <span class="text-danger">*</span></label
                            >
                            <div class="input-group">
                              <input
                                type="password"
                                class="form-control"
                                id="newPassword"
                                placeholder="New password (min 8 chars)"
                                required
                                minlength="8"
                              />
                              <button
                                class="btn btn-outline-secondary toggle-pw"
                                type="button"
                                data-target="newPassword"
                              >
                                <i class="bi bi-eye"></i>
                              </button>
                            </div>
                            <div class="mt-2">
                              <div class="progress" style="height: 6px">
                                <div
                                  class="progress-bar"
                                  id="pwStrengthBar"
                                  role="progressbar"
                                  style="width: 0%"
                                ></div>
                              </div>
                              <small class="text-muted" id="pwStrengthLabel"
                                >Enter a password</small
                              >
                            </div>
                          </div>
                          <div class="mb-4">
                            <label for="confirmPassword" class="form-label"
                              >Confirm New Password
                              <span class="text-danger">*</span></label
                            >
                            <div class="input-group">
                              <input
                                type="password"
                                class="form-control"
                                id="confirmPassword"
                                placeholder="Repeat new password"
                                required
                              />
                              <button
                                class="btn btn-outline-secondary toggle-pw"
                                type="button"
                                data-target="confirmPassword"
                              >
                                <i class="bi bi-eye"></i>
                              </button>
                            </div>
                          </div>
                          <button type="submit" class="btn btn-warning">
                            <i class="bi bi-lock me-1"></i> Change Password
                          </button>
                        </form>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </main>

      <div data-admin-footer></div>
    </div>

    <script
      src="js/template/overlayscrollbars.browser.es6.min.js"
      crossorigin="anonymous"
    ></script>
    <script src="js/template/popper.min.js" crossorigin="anonymous"></script>
    <script src="js/template/bootstrap.min.js" crossorigin="anonymous"></script>
    <script src="js/template/adminlte.min.js"></script>
    <script src="js/locales/vi.js"></script>
  <script src="js/locales/en.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/http.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/services/user.service.js"></script>
    <script src="js/services/notification.service.js"></script>
    <script>
      Auth.guard();
      AdminNotif.init();
    </script>
    <script src="js/pages/profile.js"></script>
  </body>
</html>
