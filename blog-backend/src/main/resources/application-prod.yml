server:
    port: 8055
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
application:
  security:
    token-prefix: "Bearer "
    jwt:
      # QUAN TRONG: Dat secret la chuoi Base64 it nhat 32 bytes (256-bit) de dung voi HMAC-SHA256+
      # Tao bang lenh: openssl rand -base64 32
#      secret: jwt-secret-key-which-is-at-least-256-bits-long-and-base64-encoded
      secret: ${APPLICATION_SECURITY_JWT_SECRET}
      token-validity-in-seconds: 3600
      token-validity-in-seconds-for-remember-me: 2592000
      token-validity-in-seconds-for-refresh: 604800
    oauth2:
      authorizedRedirectUris: https://phuongcm.com/login.html,https://www.phuongcm.com/login.html,https://admin.phuongcm.com/login.html,myandroidapp://oauth2/redirect,myiosapp://oauth2/redirect

spring:
  application:
    name: Blog
  config:
    activate:
      on-profile: prod
  devtools:
    restart:
      enabled: false
    livereload:
      enabled: false

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:redis}
      port: ${SPRING_DATA_REDIS_PORT:6379}

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:kafka:29092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: blog-backend-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"

  elasticsearch:
    uris: ${SPRING_ELASTICSEARCH_URIS:http://elasticsearch:9200}
    connection-timeout: 3s
    socket-timeout: 30s
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
#    url: jdbc:mysql://localhost:3307/blog
#    username: root
#    password: 123456
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://mysql:3306/blog}
    username: ${SPRING_DATASOURCE_USERNAME:phuongchu}
    password: ${SPRING_DATASOURCE_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    format_sql: true
    properties:
      hibernate:
#        dialect: org.hibernate.dialect.MySQLDialect
#      hibernate.id.new_generator_mappings: true
#      hibernate.cache.use_second_level_cache: false
#      hibernate.cache.use_query_cache: false
#      hibernate.generate_statistics: true
  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

  security:
    oauth2:
      client:
        registration:
            google:
              client-id: ${SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_ID:}
              client-secret: ${SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_SECRET:}
              redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
              scope:
                - email
                - profile
#            facebook:
#              client-id:
#              client-secret:
#              redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
#              scope:
#                - email
#                - public_profile
#            github:
#              client-id:
#              client-secret:
#              redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
#              scope:
#                - user:email
#                - read:user
        provider:
          facebook:
            authorization-uri: https://www.facebook.com/v3.0/dialog/oauth
            token-uri: https://graph.facebook.com/v3.0/oauth/access_token
            user-info-uri: https://graph.facebook.com/v3.0/me?fields=id,first_name,middle_name,last_name,name,email,verified,is_verified,picture.width(250).height(250)

  mail:
    host: ${SPRING_MAIL_HOST:smtp.gmail.com}
    port: ${SPRING_MAIL_PORT:587}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
        debug: false

app:
  base-url: ${APP_BASE_URL:https://api.phuongcm.com}
  public-url: ${APP_PUBLIC_URL:https://phuongcm.com}

minio:
    endpoint: ${MINIO_ENDPOINT:http://minio:9000}
    public-url: ${MINIO_PUBLIC_URL:https://media.phuongcm.com}
    access:
        name: ${MINIO_ACCESS_NAME:}
        secret: ${MINIO_ACCESS_SECRET:}
    bucket-private: ${MINIO_BUCKET_PRIVATE:private-bucket}
    bucket-public: ${MINIO_BUCKET_PUBLIC:public-bucket}
    bucket-public-policy: ${MINIO_BUCKET_PUBLIC_POLICY:public-policy.json}
