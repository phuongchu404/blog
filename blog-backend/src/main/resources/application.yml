server:
    port: 8055
application:
  security:
    token-prefix: "Bearer "
    jwt:
      # QUAN TRỌNG: Đặt secret là chuỗi Base64 ít nhất 32 bytes (256-bit) để dùng với HMAC-SHA256+
      # Tạo bằng lệnh: openssl rand -base64 32
#      secret: jwt-secret-key-which-is-at-least-256-bits-long-and-base64-encoded
      secret:
      token-validity-in-seconds: 3600         # Giảm xuống 1 giờ (trước đó là 24h)
      token-validity-in-seconds-for-remember-me: 2592000  # 30 ngày
      token-validity-in-seconds-for-refresh: 604800 # 7 days
    oauth2:
      authorizedRedirectUris: http://localhost:5500/login.html,http://127.0.0.1:5500/login.html,http://localhost:5500/blog-public/login.html,http://127.0.0.1:5500/blog-public/login.html,myandroidapp://oauth2/redirect,myiosapp://oauth2/redirect


spring:
  application:
    name: Blog
  profiles:
    active: dev
  devtools:
    restart:
      enabled: true
    livereload:
      enabled: true

  # Redis Configuration
  data:
    redis:
      host: localhost
      port: 6379

  # Kafka Configuration
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: blog-backend-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"

  # Elasticsearch Configuration
  elasticsearch:
    uris: http://localhost:9200
    connection-timeout: 3s
    socket-timeout: 30s
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3307/blog
    username: root
    password: 123456
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    format_sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
#      hibernate.id.new_generator_mappings: true
#      hibernate.cache.use_second_level_cache: false
#      hibernate.cache.use_query_cache: false
#      hibernate.generate_statistics: true
  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

  security:
    oauth2:
      client:
        registration:
            google:
              client-id:
              client-secret:
              redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
              scope:
                - email
                - profile
#            facebook:
#              client-id:
#              client-secret:
#              redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
#              scope:
#                - email
#                - public_profile
#            github:
#              client-id:
#              client-secret:
#              redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
#              scope:
#                - user:email
#                - read:user
        provider:
          facebook:
            authorization-uri: https://www.facebook.com/v3.0/dialog/oauth
            token-uri: https://graph.facebook.com/v3.0/oauth/access_token
            user-info-uri: https://graph.facebook.com/v3.0/me?fields=id,first_name,middle_name,last_name,name,email,verified,is_verified,picture.width(250).height(250)

  # Mail Configuration (Gmail SMTP — dùng App Password, không dùng mật khẩu thường)
  mail:
    host: smtp.gmail.com
    port: 587
    username: phuongchu404@gmail.com      # ← Thay bằng Gmail của bạn
    password:            # ← Thay bằng App Password (16 ký tự)
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
        debug: false

# App-level config
app:
  base-url: http://localhost:8055          # URL của backend (dùng trong confirm link)
  public-url: http://127.0.0.1:5500       # URL của blog-public (dùng để redirect)

